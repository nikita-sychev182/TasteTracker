{% extends "base.html" %}

{% block title %}Удаление впечатления{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-12 col-md-8">
            <div class="card border-danger">
                <div class="card-body">
                    <h1 class="h3 mb-3">Удаление впечатления</h1>
                    <p class="mb-4">Вы уверены, что хотите удалить «{{ object.title }}»?</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <button class="btn btn-danger" type="submit">Да, удалить</button>
                            <a class="btn btn-outline-secondary" href="{% url 'tracker:item_detail' object.pk %}">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
