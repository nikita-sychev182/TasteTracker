<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% if object %}Редактирование впечатления{% else %}Новое впечатление{% endif %}
    </title>
</head>
<body>
    <h1>
        {% if object %}Редактирование впечатления{% else %}Добавление впечатления{% endif %}
    </h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить</button>
    </form>

    <p><a href="{% url 'tracker:item_list' %}">Назад к списку</a></p>
</body>
</html>
