{% extends "base.html" %}

{% block title %}Редактирование профиля{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card">
                <div class="card-body">
                    <h1 class="h3 mb-3">Редактирование профиля</h1>

                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button class="btn btn-primary w-100" type="submit">Сохранить</button>
                    </form>

                    <div class="mt-3">
                        <a class="btn btn-sm btn-outline-secondary" href="{% url 'users:profile' request.user.username %}">
                            Вернуться в профиль
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
